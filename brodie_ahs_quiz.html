<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Brodie AHS — Certification Quiz</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --dark:#1A1A1A;--dark2:#2D2D2D;
  --red:#980000;--red2:#CE102C;
  --gray:#666;--gray2:#D0D0D0;
  --cream:#F5F0EB;--light:#F2F2F2;--white:#fff;
  --font:-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif;
}
html,body{background:#111;font-family:var(--font);min-height:100vh}
#wrap{background:var(--white);color:var(--dark2);width:100%;min-height:100vh;display:flex;flex-direction:column;max-width:880px;margin:0 auto}
@media(min-width:920px){#wrap{border-radius:4px;border:1px solid var(--gray2);box-shadow:0 2px 12px rgba(0,0,0,.15);min-height:640px;margin:24px auto;overflow:hidden}}
.nav{background:var(--dark);display:flex;align-items:center;justify-content:space-between;padding:0 24px;height:54px;flex-shrink:0}
.nav-left{display:flex;align-items:center;gap:12px}
.b-logo{height:22px;width:auto}
.nav-pipe{width:1px;height:18px;background:#333}
.nav-title{font-size:10px;letter-spacing:2px;color:#888;text-transform:uppercase;font-weight:500}
.nav-right{display:flex;align-items:center;gap:10px}
.prog-lbl{font-size:10px;color:#555;letter-spacing:1px}
.prog-track{width:72px;height:2px;background:#333;border-radius:1px;overflow:hidden}
.prog-fill{height:100%;background:var(--red2);transition:width .3s}
.lock-bar{background:var(--red);color:#fff;text-align:center;padding:9px;font-size:10px;letter-spacing:2px;text-transform:uppercase;font-weight:600;flex-shrink:0}
.body{flex:1;width:100%;background:#fff}
.foot{background:var(--dark);display:flex;align-items:center;justify-content:space-between;padding:0 24px;height:48px;border-top:1px solid #222;flex-shrink:0}
.foot-lbl{font-size:9px;letter-spacing:2px;color:#555;text-transform:uppercase}
.btn{font-size:10px;letter-spacing:1.5px;text-transform:uppercase;border:1px solid #333;background:transparent;color:#666;padding:7px 18px;border-radius:2px;cursor:pointer;font-family:var(--font);font-weight:500;transition:all .15s}
.btn:hover:not(:disabled){border-color:#888;color:#fff}
.btn:disabled{opacity:.2;cursor:not-allowed}
.btn.prim{background:#fff;border-color:#fff;color:var(--dark)}
.btn.prim:hover:not(:disabled){background:#e8e4dc}
.btn.red-btn{background:var(--red);border-color:var(--red);color:#fff}
.btn.red-btn:hover:not(:disabled){background:var(--red2)}
.sec{padding:32px 40px 28px;background:#fff}
.callout{background:var(--dark);color:#fff;padding:16px 20px;border-radius:2px;margin:12px 0}
.ch{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--red2);margin-bottom:5px;font-weight:600}
.cb{font-size:12px;color:#ccc;line-height:1.6;font-weight:300}
.q-hdr{background:var(--dark);padding:28px 40px 24px}
.q-top{display:flex;justify-content:space-between;align-items:flex-start}
.q-hh{font-size:30px;font-weight:700;color:#fff;line-height:1.1}
.q-hh span{color:var(--red2)}
.q-meta{font-size:9px;color:#555;letter-spacing:1.5px;text-transform:uppercase;margin-top:5px}
.q-big{font-size:36px;font-weight:700;color:var(--red2);line-height:1}
.q-lbl{font-size:8px;letter-spacing:2px;text-transform:uppercase;color:#555;margin-top:2px}
.q-wrap{padding:28px 40px}
.q-pbar{height:3px;background:var(--gray2);border-radius:2px;margin-bottom:26px;overflow:hidden}
.q-pfill{height:100%;background:var(--red);border-radius:2px;transition:width .4s}
.q-num{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--gray);margin-bottom:8px;font-weight:600}
.q-txt{font-size:16px;font-weight:600;color:var(--dark);line-height:1.45;margin-bottom:20px}
.opt{display:block;width:100%;text-align:left;background:var(--cream);border:1px solid var(--gray2);border-radius:2px;padding:12px 16px;font-size:12px;color:#2D2D2D;cursor:pointer;font-family:var(--font);font-weight:400;line-height:1.5;margin-bottom:7px;transition:all .12s}
.opt:hover:not([disabled]):not(.sel):not(.correct):not(.wrong){background:var(--light);border-color:#aaa}
.opt.sel{background:#fff3f3;border-color:var(--red);font-weight:500}
.opt.correct{background:#edf5ed;color:#1a4d1a;border-color:#2a6e2a;font-weight:500}
.opt.wrong{background:#fdf0f0;color:#7a1a1a;border-color:var(--red);font-weight:500}
.opt[disabled]{cursor:not-allowed}
.q-fb{margin-top:12px;padding:12px 16px;border-radius:2px;font-size:12px;line-height:1.6}
.q-fb.good{background:#edf5ed;color:#1a4d1a;border-left:3px solid #2a6e2a}
.q-fb.bad{background:#fdf0f0;color:#7a1a1a;border-left:3px solid var(--red)}
.q-nr{margin-top:20px;display:flex;justify-content:flex-end}
.result{text-align:center;padding:48px 40px 44px}
.result-h{font-size:46px;font-weight:700;line-height:1;margin-bottom:6px;color:var(--dark)}
.result-h em{color:var(--red);font-style:normal}
.result-sc{font-size:10px;letter-spacing:2px;color:var(--gray);text-transform:uppercase;margin-bottom:16px}
.result-b{font-size:13px;color:#2D2D2D;max-width:420px;margin:0 auto 24px;line-height:1.7;font-weight:300}
.cert{border:1px solid var(--gray2);border-radius:2px;padding:24px 28px;max-width:340px;margin:0 auto;background:var(--cream);display:flex;flex-direction:column;align-items:center;gap:6px}
.cert-top{font-size:8px;letter-spacing:3px;text-transform:uppercase;color:var(--gray);font-weight:600}
.cert-role{font-size:20px;font-weight:700;color:var(--dark);text-align:center}
.cert-sub{font-size:10px;color:var(--gray);text-align:center}
.start-hero{background:var(--dark);padding:44px 40px 0}
.start-eye{font-size:9px;letter-spacing:3px;color:#555;text-transform:uppercase;margin-bottom:14px;font-weight:500}
.start-h{font-size:42px;font-weight:700;line-height:1.05;color:#fff}
.start-h em{color:var(--red2);font-style:normal}
.start-sub{font-size:13px;color:#888;line-height:1.7;max-width:540px;margin-top:12px;font-weight:300;padding-bottom:32px}
.stat-strip{display:flex;border-top:1px solid #222;background:var(--dark)}
.stat-cell{flex:1;padding:14px 18px;border-right:1px solid #222}
.stat-cell:last-child{border-right:none}
.stat-val{font-size:24px;font-weight:700;color:var(--red2)}
.stat-key{font-size:8px;letter-spacing:2px;color:#555;text-transform:uppercase;margin-top:2px;font-weight:500}
@media(max-width:640px){
  html,body{height:auto;-webkit-text-size-adjust:100%}
  .nav{padding:0 14px}.nav-title,.nav-pipe{display:none}
  .b-logo{height:20px}
  .foot{padding:0 14px;height:54px}
  .btn{padding:10px 16px;font-size:11px;min-height:44px}
  .sec{padding:20px 16px 16px}
  .start-hero{padding:24px 16px 0}.start-h{font-size:26px}.start-sub{font-size:13px;padding-bottom:22px}
  .q-hdr{padding:20px 16px 16px}.q-hh{font-size:22px}.q-meta{font-size:10px}
  .q-top{flex-wrap:wrap;gap:8px}.q-big{font-size:28px}
  .q-wrap{padding:18px 16px}.q-txt{font-size:15px}
  .opt{padding:14px;font-size:13px;margin-bottom:9px;min-height:44px}
  .q-fb{font-size:13px}
  .result{padding:30px 16px 26px}.result-h{font-size:30px}
  .stat-strip{flex-wrap:wrap}.stat-cell{flex:1 1 50%}
  .stat-val{font-size:22px}.stat-key{font-size:9px}
  .callout{padding:14px 16px}.ch{font-size:10px}.cb{font-size:13px}
}
</style>
</head>

<script>
var QS = [
  {

      "Every athlete should leave game night feeling like a pro — capture moments they're proud to share that build community and grow the league"

    "exp": "The AHS North Star is about making athletes feel like pros through elite footage that sparks sharing, builds pride, and drives league growth."

  {

// Shuffle option order per question so the correct answer isn't always last.
function shuffleAllQuestions(){
  QS.forEach(function(q){
    if (!q._origOpts){ q._origOpts = q.opts.slice(); q._origA = q.a; }
    var pairs = q._origOpts.map(function(txt, i){ return { txt: txt, correct: i === q._origA }; });
    for (var i = pairs.length - 1; i > 0; i--) {
      var j = Math.floor(Math.random() * (i + 1));
      var t = pairs[i]; pairs[i] = pairs[j]; pairs[j] = t;
    }
    q.opts = pairs.map(function(p){ return p.txt; });
    q.a = pairs.findIndex(function(p){ return p.correct; });
  });
}
shuffleAllQuestions();

var qs = { active:false, qi:0, ans:{}, sub:false, passed:false, att:0 };

function render(){
  var b = document.getElementById('body');
  var pbar = document.getElementById('pfill');
  var plbl = document.getElementById('plbl');
  var lk = document.getElementById('lkbar');
  var fatt = document.getElementById('fatt');
  lk.style.display = (qs.active && !qs.passed) ? '' : 'none';
  fatt.textContent = 'Attempts used: ' + qs.att + ' / 2';

  if (qs.passed) {
    pbar.style.width = '100%'; plbl.textContent = '10 / 10';
    b.innerHTML = '<div class="result"><div class="result-h">Certified.<br><em>Go film.</em></div>' +
      '<div class="result-sc">10 / 10 &middot; 100%</div>' +
      '<p class="result-b">Show up early, stay locked in, capture elite content, and make athletes feel like pros every game night.</p>' +
      '<div class="cert"><div class="cert-top">Certificate of Completion</div>' +
      '<div class="cert-role">Athlete Highlight Specialist</div>' +
      '<div class="cert-sub">Brodie Rec. League &middot; ' + new Date().toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'}) + '</div></div>' +
      '<div style="margin-top:26px"><button class="btn" onclick="resetQuiz()">Reset</button></div></div>';
    return;
  }

  if (qs.sub && qs.att >= 2) {
    var s=0; for (var i=0;i<QS.length;i++){ if (qs.ans[i]===QS[i].a) s++; }
    pbar.style.width = (s/QS.length*100)+'%'; plbl.textContent = s+' / '+QS.length;
    b.innerHTML = '<div class="result"><div class="result-h">Failed.<br><em>'+s+'/10.</em></div>' +
      '<div class="result-sc">'+Math.round(s/QS.length*100)+'% &middot; Need 100%</div>' +
      '<p class="result-b">Both attempts used. Contact your manager before your first shift.</p>' +
      '<div style="margin-top:20px"><button class="btn" onclick="resetQuiz()">Reset</button></div></div>';
    return;
  }

  if (qs.sub && !qs.passed) {
    var s2=0; for (var j=0;j<QS.length;j++){ if (qs.ans[j]===QS[j].a) s2++; }
    pbar.style.width = (s2/QS.length*100)+'%'; plbl.textContent = s2+' / '+QS.length;
    b.innerHTML = '<div class="result"><div class="result-h">Failed.<br><em>'+s2+'/10.</em></div>' +
      '<div class="result-sc">'+Math.round(s2/QS.length*100)+'% &middot; Need 100%</div>' +
      '<p class="result-b">You need 100% to certify. Review all sections carefully — 1 attempt remaining.</p>' +
      '<div style="margin-top:20px"><button class="btn red-btn" onclick="startQuiz()">Retry &rarr;</button></div></div>';
    return;
  }

  if (!qs.active) {
    var left = 2 - qs.att;
    pbar.style.width = '0%'; plbl.textContent = '0 / '+QS.length;
    b.innerHTML =
      '<div class="start-hero"><div class="start-eye">Brodie Rec. League — Module 02</div>' +
      '<div class="start-h">Certification<br><em>Quiz.</em></div>' +
      '<p class="start-sub">10 questions. 100% required to certify. You have '+left+' attempt'+(left!==1?'s':'')+' remaining. Once started, navigation locks until you submit.</p></div>' +
      '<div class="stat-strip">' +
      '<div class="stat-cell"><div class="stat-val">10</div><div class="stat-key">Questions</div></div>' +
      '<div class="stat-cell"><div class="stat-val">100%</div><div class="stat-key">Pass Rate</div></div>' +
      '<div class="stat-cell"><div class="stat-val">'+left+'</div><div class="stat-key">Attempts Left</div></div>' +
      '</div>' +
      '<div class="sec">' +
      '<div class="callout"><div class="ch">Ready?</div><div class="cb">Answer all 10 questions, then submit. You cannot revisit previous questions during the attempt.</div></div>' +
      '<div style="margin-top:20px"><button class="btn red-btn" onclick="startQuiz()">Start Quiz &rarr;</button></div>' +
      '</div>';
    return;
  }

  // Active question view
  var qi = qs.qi;
  var q = QS[qi];
  var answered = (qs.ans[qi] !== undefined);
  var pct = Math.round((qi)/QS.length*100);
  pbar.style.width = pct+'%';
  plbl.textContent = (qi+1)+' / '+QS.length;

  var h = '<div class="q-hdr"><div class="q-top"><div><div class="q-hh">Question <span>'+(qi+1)+'</span> of '+QS.length+'</div>' +
          '<div class="q-meta">Certification · 100% required</div></div>' +
          '<div style="text-align:right"><div class="q-big">'+(qi+1)+'</div><div class="q-lbl">of '+QS.length+'</div></div></div></div>' +
          '<div class="q-wrap">' +
          '<div class="q-pbar"><div class="q-pfill" style="width:'+pct+'%"></div></div>' +
          '<div class="q-num">Question '+(qi+1)+' of '+QS.length+'</div>' +
          '<div class="q-txt">'+q.q+'</div>';
  for (var oi=0; oi<q.opts.length; oi++){
    var c = 'opt';
    if (answered){ if (oi===q.a) c+=' correct'; else if (qs.ans[qi]===oi) c+=' wrong'; }
    else if (qs.ans[qi]===oi){ c+=' sel'; }
    h += '<button class="'+c+'" '+(answered?'disabled':'')+' onclick="pickQ('+oi+')">'+q.opts[oi]+'</button>';
  }
  if (answered){
    var ok = qs.ans[qi]===q.a;
    h += '<div class="q-fb '+(ok?'good':'bad')+'">'+(ok?'✓ Correct — ':'✗ Incorrect — ')+q.exp+'</div>' +
         '<div class="q-nr">' + (qi<QS.length-1
            ? '<button class="btn red-btn" onclick="nextQ()">Next Question &rarr;</button>'
            : '<button class="btn red-btn" onclick="submitQuiz()">Submit Quiz &rarr;</button>') + '</div>';
  }
  h += '</div>';
  b.innerHTML = h;
  b.scrollTop = 0;
}
function startQuiz(){ shuffleAllQuestions(); qs.active=true; qs.qi=0; qs.ans={}; qs.sub=false; render(); }
function pickQ(oi){ if (qs.ans[qs.qi]!==undefined) return; qs.ans[qs.qi]=oi; render(); }
function nextQ(){ qs.qi++; render(); }
function submitQuiz(){
  qs.active=false; qs.sub=true; qs.att++;
  var s=0; for (var i=0;i<QS.length;i++){ if (qs.ans[i]===QS[i].a) s++; }
  if (s===QS.length) qs.passed=true;
  render();
}
function resetQuiz(){ qs = { active:false, qi:0, ans:{}, sub:false, passed:false, att:0 }; render(); }

render();
</script>
